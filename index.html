<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SL MOVIE CLUB</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial;background:#111;color:#fff;}

header{
  background:#000;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.logo{color:red;font-size:22px;font-weight:bold;}
.menu-icon{font-size:28px;cursor:pointer;display:none;}

nav{display:flex;}
nav a{color:#fff;text-decoration:none;margin-left:20px;}

@media(max-width:768px){
  .menu-icon{display:block;}
  nav{display:none;position:absolute;top:60px;left:0;width:100%;background:#000;flex-direction:column;text-align:center;}
  nav.active{display:flex;}
  nav a{margin:10px 0;}
}

.search-container{text-align:center;margin:20px;}
#searchInput{width:80%;padding:12px;border-radius:30px;border:none;}

.movie-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:15px;
  padding:15px;
}

.movie-card{
  position:relative;
  border-radius:10px;
  overflow:hidden;
  color:white;
  cursor:pointer;
}

.movie-card img{
  width:100%;
  height:230px;
  object-fit:cover;
}

.overlay{
  position:absolute;
  bottom:0;
  width:100%;
  padding:10px;
  background:linear-gradient(to top,rgba(0,0,0,0.9),transparent);
}

.movie-title{font-size:14px;font-weight:bold;}

.tag{
  position:absolute;
  top:8px;
  left:8px;
  background:red;
  padding:3px 7px;
  font-size:11px;
  border-radius:4px;
}

.rating{
  position:absolute;
  top:8px;
  right:8px;
  background:gold;
  color:#000;
  padding:3px 6px;
  font-size:12px;
  border-radius:4px;
}

/* DELETE BUTTON */
.delete-btn{
  position:absolute;
  bottom:8px;
  right:8px;
  background:red;
  color:#fff;
  border:none;
  padding:5px 8px;
  font-size:12px;
  border-radius:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div class="logo">SL MOVIE CLUB</div>
  <div class="menu-icon" onclick="toggleMenu()">☰</div>
  <nav id="navMenu">
    <a href="#">Home</a>
    <a href="#">Movies</a>
    <a href="#">Series</a>
    <a href="admin.html">Admin</a>
  </nav>
</header>

<div class="search-container">
<input type="text" id="searchInput" placeholder="Search..." onkeyup="searchMovies()">
</div>

<div class="movie-grid" id="movieList"></div>

<script>
function toggleMenu(){
  document.getElementById("navMenu").classList.toggle("active");
}

let movies = JSON.parse(localStorage.getItem("movies")) || [];
let container = document.getElementById("movieList");

// DISPLAY
function displayMovies(list){
  container.innerHTML="";

  list.forEach((movie,index)=>{
    container.innerHTML += `
    <div class="movie-card" onclick="openMovie(${index})">
      <img src="${movie.img}">
      <span class="tag">WEB</span>
      <span class="rating">⭐ ${movie.rating}</span>

      <div class="overlay">
        <div class="movie-title">${movie.name}</div>
      </div>

      <button class="delete-btn" onclick="deleteMovie(event, ${index})">Delete</button>
    </div>`;
  });
}

// OPEN MOVIE
function openMovie(index){
  let m = movies[index];
  window.location.href = `movie.html?name=${m.name}&img=${m.img}&link=${m.link}`;
}

// DELETE
function deleteMovie(event, index){
  event.stopPropagation(); // 🔥 important

  if(confirm("Delete this movie?")){
    movies.splice(index,1);
    localStorage.setItem("movies", JSON.stringify(movies));
    displayMovies(movies);
  }
}

// SEARCH
function searchMovies(){
  let input=document.getElementById("searchInput").value.toLowerCase();
  let filtered=movies.filter(m=>m.name.toLowerCase().includes(input));
  displayMovies(filtered);
}

// LOAD
displayMovies(movies);
</script>

</body>
</html>
